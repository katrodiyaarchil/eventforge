name: "Eventforge CI"

on:
    pull_request:
        branches: ["main"]
    push:
        branches: ["main"]

jobs:
    test:
        name: Run Unit test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio httpx
                
            - name: Run Unit test
              run: pytest tests/